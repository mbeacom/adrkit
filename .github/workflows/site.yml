name: Deploy site

# Builds the Astro/Starlight docs site with Bun and deploys it to GitHub Pages
# at the custom apex domain adrkit.dev. Kept separate from ci.yml on purpose:
# the project's build/test/lint gates and the site deploy are independent
# concerns and should not block or entangle each other.

on:
  push:
    branches: [main]
    # Redeploy when anything that affects the published site changes: the site
    # itself, the canonical schema it serves at its $id, the ADR corpus it
    # renders, or this workflow.
    paths:
      - 'site/**'
      - 'schema/adr.schema.json'
      - 'docs/adr/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Serve canonical schema at its $id
        run: bun run sync:schema

      - name: Guard — served schema is byte-identical to the canonical schema
        run: bun run check:schema

      - name: Build site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path is relative to the repository root, not the job working dir.
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
