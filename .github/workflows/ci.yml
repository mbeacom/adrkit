name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  clean-clone-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Test (includes resolution-is-pure)
        run: bun test
      - name: Verify schema emit matches
        run: bun run schema:emit && git diff --exit-code schema/adr.schema.json
      - name: Verify committed Action bundle matches source
        run: git diff --exit-code packages/ci/dist
      - name: Verify dependency boundaries (adapters + toolkit confinement)
        run: bun run check:deps
      - name: Lint ADR corpus
        run: bun run adr lint

  node-smoke-built-artifacts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Smoke test built Node artifacts (core, evaluator, CLI incl. offline adr evaluate, Action bundle)
        run: node scripts/smoke-node.mjs

  self-dogfood:
    # Run the CI surface against the project that ships it: adr check on the PR's
    # changed files. Governs the corpus that defines the tool (rung-3 dogfood).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: adr check on the PR's changed files
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          # Include deletions: a decision may govern a removed path, so deleted files
          # must stay in the changed set for path matchers to fire.
          mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Changed files:"
          printf '  %s\n' "${changed[@]}"
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No changed files to check."
            exit 0
          fi
          bun run adr check "${changed[@]}"
