name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  clean-clone-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test
      - name: Verify schema emit matches
        run: bun run schema:emit && git diff --exit-code schema/adr.schema.json
      - name: Verify core has no adapter deps
        run: bun run check:deps
      - name: Lint ADR corpus
        run: bun run adr lint

  node-smoke-built-artifacts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Smoke test built Node artifacts
        run: node scripts/smoke-node.mjs
