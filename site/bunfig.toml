# The docs site installs independently of the root workspace (it is deliberately
# not a workspace member, so it stays out of `bun run build`/`lint`, the root
# typecheck, and the dependency checks — see ADR-0011). It still follows the
# repo's lockfile convention from ADR-0010.
[install]

# ADR-0001/0004: this is a git-native, review-centric project. The lockfile is
# reviewed like any other file, so it must stay text (bun.lock, never bun.lockb).
saveTextLockfile = true

# Install only packages of 3 days or older, matching the root policy.
minimumReleaseAge = 259200
